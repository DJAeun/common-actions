name: 🔐 시크릿 키 유출 방지 (TruffleHog)

on:
  workflow_call:

jobs:
  scan-secrets:
    name: 🕵️ 민감 정보 스캔
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리를 가져와 과거 커밋까지 모두 스캔

      - name: TruffleHog 리포지토리 스캔
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      # 스캔 통과 시 슬랙/디스코드 등 웹훅을 추가할 수도 있습니다.
