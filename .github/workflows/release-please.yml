name: Release Please

on:
  workflow_call:
    inputs:
      release-type:
        required: false
        type: string
        default: "python"
        description: "Release please release type"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          release-type: ${{ inputs.release-type }}
          # PR이 병합되면 자동으로 버전 계산(v1.0.0 등), CHANGELOG.md 업데이트 및 Release 배포
