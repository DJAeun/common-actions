name: 🔍 PR 안전벨트 (Lint & Test)

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.10"

jobs:
  lint-and-test:
    name: 🚦 코드 검사 (Python)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip" # 패키지 다운로드 속도 향상을 위한 캐시 활성화

      - name: 📦 의존성 및 검사 도구 설치
        run: |
          python -m pip install --upgrade pip
          # 프로젝트 의존성 설치
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 검사 필수 패키지 설치
          pip install flake8 black pytest

      # 1단계: 치명적인 문법 에러 및 버그성 코드만 엄격하게 검증 (실패 시 차단)
      - name: 🚨 문법 및 치명적 에러 검사 (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # 기존 코드의 사소한 띄어쓰기 등은 경고만 띄우고 차단하지 않음
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      # 2단계: 코드 포맷팅 스타일 검증 (참고용)
      - name: 🎨 코드 스타일 검사 (Black)
        continue-on-error: true # 포맷팅 불일치로 바로 에러 처리하지 않고 경고만 띄움
        run: black --check --diff .

      # 3단계: 자동화 테스트 (Pytest)
      - name: 🧪 테스트 코드 실행 (Pytest)
        run: |
          # 테스트 파일이 존재할 경우에만 실행
          if ls test_*.py *_test.py 1> /dev/null 2>&1 || [ -d "tests" ]; then
            pytest
          else
            echo "테스트 코드를 찾을 수 없어 건너뜁니다."
          fi
