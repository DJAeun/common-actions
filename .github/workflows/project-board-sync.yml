name: Project Board Auto Sync

on:
  workflow_call:
    inputs:
      project-url:
        required: true
        type: string
        description: "GitHub Project URL"
    secrets:
      ADD_TO_PROJECT_PAT:
        required: true
        description: "Personal Access Token with Project V2 permissions"

jobs:
  add-to-project:
    name: Add item to GitHub Project
    runs-on: ubuntu-latest
    steps:
      - name: Add to Project
        uses: actions/add-to-project@v1.0.1
        with:
          project-url: ${{ inputs.project-url }}
          
          # GitHub Projects V2 접근 권한이 있는 Personal Access Token (PAT)
          # Repository Secrets에 ADD_TO_PROJECT_PAT 라는 이름으로 등록해야 합니다. (프로젝트 소유자 계정의 토큰 등)
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
